<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>kite racing</title>

<style>
/* ===== 全体 ===== */
body{
  margin:0;
  font-family: sans-serif;
  color: white;
  text-align: center;
  opacity: 0;

  /* 背景画像＋暗く */
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url("bg.jpg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  /* アニメーション */
  animation: fade 0.8s forwards, zoom 20s infinite alternate;
}

/* フェードイン */
@keyframes fade{
  to{ opacity: 1; }
}

/* ズーム */
@keyframes zoom{
  from{ background-size: 100%; }
  to{ background-size: 110%; }
}

/* ===== タイトル ===== */
.hero{
  font-size: 60px;
  margin-top: 150px;
  opacity: 0;
  transform: translateY(50px);
  animation: fadeUp 1s forwards;
}

/* サブ */
.sub{
  opacity: 0;
  transform: translateY(50px);
  animation: fadeUp 1s forwards;
  animation-delay: 0.3s;
}

/* ===== カード ===== */
.cards{
  margin-top: 100px;
  display: flex;
  justify-content: center;
  gap: 30px;
}

.card{
  width: 200px;
  height: 120px;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;

  opacity: 0;
  transform: translateY(50px);
  animation: fadeUp 1s forwards;
  transition: 0.3s;
}

/* 遅延 */
.card:nth-child(1){ animation-delay: 0.6s; }
.card:nth-child(2){ animation-delay: 0.8s; }
.card:nth-child(3){ animation-delay: 1s; }

/* ホバー */
.card:hover{
  transform: scale(1.1) translateY(-10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* クリック */
.card:active{
  transform: scale(0.95);
}

/* ===== アニメーション ===== */
@keyframes fadeUp{
  to{
    opacity: 1;
    transform: translateY(0);
  }
}

/* ===== メニュー ===== */
#toggleBtn{
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;

  background: #2a5298;
  color: white;
  border-radius: 30px;
  padding: 10px 20px;
  border: none;
  cursor: pointer;
}

/* サイドバー */
.right-box{
  position: fixed;
  top: 0;
  right: 0;
  width: 300px;
  height: 100vh;
  background: linear-gradient(135deg, #1a1d24, #2a2f3a);
  padding-top: 80px;
  transition: transform 0.5s ease;
}

.right-box.closed{
  transform: translateX(100%);
}

/* フッター */
a{
  display: block;
  margin-top: 100px;
  color: #ccc;
}
</style>

</head>
<body>

<h1 class="hero">kite racing</h1>

<p class="sub">Welcome to the new racing game.</p>

<div class="cards">
  <div class="card" onclick="location.href='di.html'">Detailed information</div>
  <div class="card" onclick="location.href='atb.html'">About the developer</div>
  <div class="card" onclick="location.href='ds.html'">Development status</div>
</div>

<button id="toggleBtn">メニュー</button>

<div class="right-box closed" id="sidebar">
  メニュー内容
  <button onclick="location.href='page2.html'">お問い合わせ</button>
</div>

<a href="kure.html">©kei5sai 2025-2026</a>

<script>
// メニュー
const btn = document.getElementById("toggleBtn");
const sidebar = document.getElementById("sidebar");

btn.addEventListener("click", () => {
  sidebar.classList.toggle("closed");
});
</script>

</body>
</html>

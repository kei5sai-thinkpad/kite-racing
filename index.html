<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>kite racing</title>

<style>
body{
  margin: 0;
  background: linear-gradient(135deg, #fbfdff, #2a5298);
}

/* ===== 文字アニメーション ===== */
.fade-text span {
  display: inline-block;
  opacity: 0;
  transform: translateY(40px);
  transition: 0.5s;
}

.fade-text.show span {
  opacity: 1;
  transform: translateY(0);
}

.fade-text {
  text-align: center;
  padding-top: 20px;
}

/* ===== ボタン ===== */
#toggleBtn{
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;

  background: #2a5298;
  color: white;
  border-radius: 30px;
  padding: 10px 20px;
  border: none;
  cursor: pointer;
}

/* ===== サイドバー ===== */
.right-box{
  position: fixed;
  top: 0;
  right: 0;
  width: 300px;
  height: 100vh;
  background: linear-gradient(135deg, #1a1d24, #2a2f3a);
  padding-top: 80px;
  transition: transform 0.5s ease;
}

.right-box.closed{
  transform: translateX(100%);
}

body{
  margin:0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #0f1115, #1c1f26);
  color: white;
  text-align: center;
}

/* タイトル */
.hero{
  font-size: 60px;
  margin-top: 150px;
  opacity: 0;
  transform: translateY(50px);
  animation: fadeUp 1s forwards;
}

/* サブ */
.sub{
  opacity: 0;
  transform: translateY(50px);
  animation: fadeUp 1s forwards;
  animation-delay: 0.3s;
}

/* カード */
.cards{
  margin-top: 100px;
  display: flex;
  justify-content: center;
  gap: 30px;
}

.card{
  width: 200px;
  height: 120px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;

  opacity: 0;
  transform: translateY(50px);
  animation: fadeUp 1s forwards;
}

/* カードに遅延つける */
.card:nth-child(1){ animation-delay: 0.6s; }
.card:nth-child(2){ animation-delay: 0.8s; }
.card:nth-child(3){ animation-delay: 1s; }

/* アニメーション */
@keyframes fadeUp{
  to{
    opacity: 1;
    transform: translateY(0);
  }
}

.card{
  transition: 0.3s;
}

/* ホバー時 */
.card:hover{
  transform: scale(1.1) translateY(-10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
  
</style>

</head>
<body>

<h1 class="hero">kite racing</h1>

<p class="sub">Welcome to the new racing game.</p>

<div class="cards">
  <div class="card">Detailed information</div>
  <div class="card">About the developer</div>
  <div class="card">Development status</div>
  
</div>
<div class="cards">
  <div class="card" onclick="location.href='di.html'">Detailed information</div>
  <div class="card" onclick="location.href='atb.html'">About the developer</div>
  <div class="card" onclick="location.href='ds.html'">Development status</div>
</div>
  
<button id="toggleBtn">メニュー</button>

<div class="right-box closed" id="sidebar">
  メニュー内容
  <button onclick="location.href='page2.html'">ページ2</button>
</div>

<a href="kure.html">©kei5sai 2026</a>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // ===== 文字アニメーション =====
  const text = document.querySelector('.fade-text');

  if (text) {
    const chars = text.textContent.split('');
    text.textContent = '';

    chars.forEach((char, i) => {
      const span = document.createElement('span');
      span.textContent = char;
      span.style.transitionDelay = i * 0.05 + 's';
      text.appendChild(span);
    });

    setTimeout(() => {
      text.classList.add('show');
    }, 100);
  }

  // ===== メニュー =====
  const btn = document.getElementById("toggleBtn");
  const sidebar = document.getElementById("sidebar");

  if (btn && sidebar) {
    btn.addEventListener("click", () => {
      sidebar.classList.toggle("closed");
    });
  }

});
</script>

</body>
</html>

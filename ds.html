<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Development status</title>

<style>
body{
  margin:0;
  font-family: sans-serif;
  color: white;
  text-align: center;

  /* フェードイン */
  opacity: 0;
  animation: fade 0.8s forwards;
}

@keyframes fade{
  to{ opacity: 1; }
}

/* 背景動画 */
#bg-video{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* 少し暗くするフィルター */
.overlay{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

/* タイトル */
.title{
  margin-top: 100px;
  font-size: 50px;
}

/* 戻るボタン */
.back{
  position: fixed;
  top: 20px;
  left: 20px;
  background: #4a90e2;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
}

.back:hover{
  background: #357abd;
}
</style>

</head>
<body>

<!-- 背景動画 -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="movie.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<button class="back" onclick="history.back()">← 戻る</button>

<h1 class="title">Development status</h1>

<p>
開発者；kei5sai
<hr>
<h1>開発者概要</h1>
2017年くらいからscratchを始め、2025年からPythonやHTML、Unityを始めた
</p>

</body>
</html>

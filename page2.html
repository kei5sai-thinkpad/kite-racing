<style>
body{
  margin:0;

  background: linear-gradient(135deg, #0f1115, #1c1f26);

}

/* タイトル */
.title{
  margin-top: 100px;

.back{

  padding: 10px 20px;
  border-radius: 20px;

}

.back:hover{

}

  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 300px;
  margin: 100px auto;
}

input, textarea{
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button{
  background: #4a90e2;
  color: white;
  border-radius: 20px;
  padding: 10px;

}
